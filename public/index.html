<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RivetKit Tic-Tac-Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #1a1a2e; color: #eee; }
    .container { text-align: center; }
    h1 { margin-bottom: 1rem; font-size: 2rem; }
    .status { margin-bottom: 1rem; font-size: 1.2rem; min-height: 1.5em; }
    .board { display: grid; grid-template-columns: repeat(3, 100px); gap: 5px; margin: 0 auto 1rem; }
    .cell { width: 100px; height: 100px; background: #16213e; border: 2px solid #0f3460; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; cursor: pointer; transition: background 0.2s; }
    .cell:hover { background: #1a1a4e; }
    .cell.X { color: #e94560; }
    .cell.O { color: #0f3460; }
    .cell.disabled { cursor: not-allowed; opacity: 0.6; }
    button { padding: 0.6rem 1.5rem; font-size: 1rem; background: #0f3460; color: #eee; border: none; border-radius: 6px; cursor: pointer; }
    button:hover { background: #1a1a4e; }
    .player-info { margin-bottom: 1rem; font-size: 0.9rem; color: #aaa; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Tic-Tac-Toe</h1>
    <div class="player-info" id="playerInfo">Connecting...</div>
    <div class="status" id="status"></div>
    <div class="board" id="board"></div>
    <button id="resetBtn" style="display:none;">New Game</button>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/rivetkit/client";

    const client = createClient(window.location.origin + "/api/rivet");
    const playerId = crypto.randomUUID();
    const game = client.game.getOrCreate(["lobby"]);
    const connection = game.connect({ params: { playerId } });

    let myMark = null;
    let state = null;

    const statusEl = document.getElementById("status");
    const boardEl = document.getElementById("board");
    const resetBtn = document.getElementById("resetBtn");
    const playerInfoEl = document.getElementById("playerInfo");

    function render() {
      if (!state) return;
      boardEl.innerHTML = "";
      for (let r = 0; r < 3; r++) {
        for (let c = 0; c < 3; c++) {
          const cell = document.createElement("div");
          cell.className = "cell";
          if (state.board[r][c]) {
            cell.textContent = state.board[r][c];
            cell.classList.add(state.board[r][c]);
          }
          if (!state.winner && state.board[r][c] === null && state.currentTurn === myMark) {
            cell.addEventListener("click", () => makeMove(r, c));
          } else {
            cell.classList.add("disabled");
          }
          boardEl.appendChild(cell);
        }
      }
      if (state.winner) {
        if (state.winner === "draw") {
          statusEl.textContent = "It's a draw!";
        } else {
          statusEl.textContent = state.winner === myMark ? "You win!" : `${state.winner} wins!`;
        }
        resetBtn.style.display = "inline-block";
      } else {
        statusEl.textContent = state.currentTurn === myMark ? "Your turn" : `Waiting for ${state.currentTurn}...`;
        resetBtn.style.display = "none";
      }
    }

    async function makeMove(row, col) {
      try {
        await connection.makeMove(row, col);
      } catch (e) {
        console.error(e);
      }
    }

    connection.on("stateChanged", (newState) => {
      state = newState;
      render();
    });

    connection.on("playerJoined", ({ mark, playerId: pid }) => {
      if (pid === playerId) {
        myMark = mark;
        playerInfoEl.textContent = `You are ${mark}`;
      }
    });

    connection.on("gameOver", ({ winner }) => {
      state.winner = winner;
      render();
    });

    connection.getState().then((s) => {
      state = s;
      connection.getMyMark().then((mark) => {
        myMark = mark;
        playerInfoEl.textContent = mark ? `You are ${mark}` : "Spectating";
        render();
      });
    });

    resetBtn.addEventListener("click", async () => {
      await connection.reset();
    });
  </script>
</body>
</html>
